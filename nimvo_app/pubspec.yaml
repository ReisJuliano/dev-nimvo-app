name: nimvo_app
description: Nimvo mobile dashboard for owners and managers.
publish_to: "none"
version: 0.2.10+12

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  flutter_secure_storage: ^9.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  go_router: ^13.0.0
  hugeicons: ^0.0.7
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  flutter_zxing: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/nimvo-logo.png
    - assets/branding/nimvo-logo-512.png

flutter_launcher_icons:
  android: "nimvo_launcher"
  ios: true
  # Legacy (Android < 8) and iOS: full logo on the brand gradient.
  image_path: "assets/branding/nimvo-icon-legacy.png"
  # Adaptive (Android 8+): full-bleed gradient background + the white mark
  # isolated and padded into the safe zone, so the launcher mask never crops
  # the logo and the result stays crisp instead of the old zoomed full-bleed.
  adaptive_icon_background: "assets/branding/nimvo-icon-bg.png"
  adaptive_icon_foreground: "assets/branding/nimvo-icon-fg.png"
  remove_alpha_ios: true
